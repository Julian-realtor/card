<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111111;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: #0A0A0A;
  width: 100%;
  max-width: 560px;
  border-radius: 4px;
  padding: 44px 48px 40px;
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}
.identity {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
.photo {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  flex-shrink: 0;
  border: 0.5px solid #252525;
}
.name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 28px;
  color: #FFFFFF;
  letter-spacing: 0.04em;
  line-height: 1.1;
  margin-bottom: 6px;
}
.title-line {
  font-size: 9.5px;
  font-weight: 300;
  color: #555555;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.compass-logo {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
  margin-top: 4px;
}
.compass-wordmark {
  font-weight: 500;
  font-size: 13px;
  color: #FFFFFF;
  letter-spacing: 0.26em;
  text-transform: uppercase;
}
.divider {
  width: 100%;
  height: 0.5px;
  background: #1A1A1A;
  margin: 26px 0;
}
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 32px;
}
.contact-label {
  font-size: 9px;
  font-weight: 400;
  color: #3D3D3D;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.contact-value {
  font-size: 12.5px;
  font-weight: 300;
  color: #AAAAAA;
  text-decoration: none;
  letter-spacing: 0.01em;
  display: block;
  transition: color 0.2s;
}
.contact-value:hover { color: #FFFFFF; }
.card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 26px;
}
.cta-row { display: flex; gap: 10px; flex-wrap: wrap; }
.cta-btn {
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #666666;
  border: 0.5px solid #252525;
  border-radius: 2px;
  padding: 7px 14px;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.cta-btn:hover { border-color: #555; color: #FFF; }
.cta-btn.primary { border-color: #FFFFFF; color: #FFFFFF; }
.cta-btn.primary:hover { background: #FFFFFF; color: #0A0A0A; }
.site-hint {
  font-size: 9px;
  color: #222222;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.vcf-btn {
  display: block;
  text-align: center;
  margin-top: 20px;
  padding: 11px;
  border: 0.5px solid #1E1E1E;
  border-radius: 2px;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #333333;
  cursor: pointer;
  background: transparent;
  width: 100%;
  transition: border-color 0.2s, color 0.2s;
  font-family: 'Inter', sans-serif;
}
.vcf-btn:hover { border-color: #3D3D3D; color: #777777; }
@media (max-width: 480px) {
  .card { padding: 32px 28px 28px; }
  .contact-grid { grid-template-columns: 1fr; gap: 14px; }
  .name { font-size: 24px; }
}
